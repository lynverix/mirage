<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="/baremux/index.js"></script>
    <script src="/scram/scramjet.all.js"></script>
</head>
<body>
    <style>
        iframe {
            height: 95vh;
            width: 100vw;
            background: #cfcfcf;
            position: absolute;
            left:0;
            bottom: 0;
        }
    </style>

    <input type="text" placeholder="url" id="bar"><button onclick="nav()">Go</button><br>
    <iframe src="" frameborder="0" id="frame"></iframe>

    <script>
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js") // you could always use epoxy, but libcurl is better imo
        connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://anura.pro/" }]) // use some other wisp here

        const frame = document.getElementById("frame")
        const bar = document.getElementById("bar")

        function checkAndHealDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open("$scramjet", 1);
                req.onsuccess = (e) => {
                    const db = e.target.result;
                    if (db.objectStoreNames.length === 0 || !db.objectStoreNames.contains("config")) {
                        db.close();
                        const delReq = indexedDB.deleteDatabase("$scramjet");
                        delReq.onsuccess = () => {
                            console.log("Deleted corrupt/empty $scramjet IndexedDB database.");
                            resolve();
                        };
                        delReq.onerror = () => {
                            console.error("Failed to delete corrupt $scramjet database.");
                            resolve();
                        };
                    } else {
                        db.close();
                        resolve();
                    }
                };
                req.onerror = () => resolve();
            });
        }

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            files: {
                all: "/scram/scramjet.all.js",
                wasm: "/scram/scramjet.wasm.wasm",
                sync: "/scram/scramjet.sync.js"
            },
            prefix: "/go/" // feel free to change this later
        })

        async function initProxy() {
            await checkAndHealDB();
            await scramjet.init();
            console.log("Scramjet initialized successfully.");
            
            try {
                const reg = await navigator.serviceWorker.register("/sw.js");
                console.log("Service Worker registered successfully with scope:", reg.scope);
                
                const trackState = (worker, label) => {
                    if (!worker) return;
                    console.log(`${label} worker found in state:`, worker.state);
                    worker.addEventListener("statechange", (e) => {
                        console.log(`${label} worker state changed to:`, e.target.state);
                    });
                };

                trackState(reg.installing, "Installing");
                trackState(reg.waiting, "Waiting");
                trackState(reg.active, "Active");

                reg.onupdatefound = () => {
                    const newWorker = reg.installing;
                    trackState(newWorker, "New Installing");
                };

                console.log("Current page controller:", navigator.serviceWorker.controller);
                navigator.serviceWorker.addEventListener("controllerchange", () => {
                    console.log("Service Worker took control of the page.");
                });
            } catch (err) {
                console.error("Service Worker registration failed:", err);
            }
        }

        initProxy();

        function nav() {
            let url = bar.value.trim()
            if (!url) return;

            if (!url.includes(".")) {
                url = "https://duckduckgo.com/search?q=" + encodeURIComponent(url)
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url
            }

            frame.src = scramjet.encodeUrl(url)
        }

        bar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                nav()
            }
        })
    </script>  
    
</body>
</html>
